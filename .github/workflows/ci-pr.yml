# AWCMS CI - PR Checks
# Runs on pull requests (supports forks)

name: CI (PR)

on:
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22.12.0'

permissions:
  contents: read

jobs:
  # ============================================
  # Lint & Test - Admin Panel
  # ============================================
  lint-test-admin:
    name: Lint & Test (Admin)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Tests
        # Skip tests that require secrets if running on fork? 
        # Or run them with mocks if your tests can handle it.
        # Assuming tests might fail without real env, we can skip or run with mock.
        # We will try running with mocks.
        run: npm run test -- --run
        env:
          VITE_SUPABASE_URL: "https://mock.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"

      - name: Build
        run: npm run build
        env:
          VITE_SUPABASE_URL: "https://mock.supabase.co"
          VITE_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"

  # ============================================
  # Lint & Build - Public Portal (Astro)
  # ============================================
  lint-build-public:
    name: Lint & Build (Public Portal)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-public/primary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-public/primary/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

  # ============================================
  # Flutter Build - Mobile App
  # ============================================
  build-mobile:
    name: Build (Mobile - Flutter)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-mobile/primary

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.38.5'
          channel: 'stable'
          cache: true

      - name: Create .env file
        run: cp .env.example .env

      - name: Get dependencies
        run: flutter pub get

      - name: Analyze code
        run: flutter analyze

      - name: Run tests
        run: flutter test

  # ============================================
  # Typecheck - Edge Worker
  # ============================================
  typecheck-edge:
    name: Typecheck (Edge Worker)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-edge

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-edge/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  # ============================================
  # Lint & Build - MCP Server
  # ============================================
  lint-build-mcp:
    name: Lint & Build (MCP)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-mcp/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

      - name: Run build
        run: npm run build

  # ============================================
  # Build - External Extension Package
  # ============================================
  build-ext-primary-analytics:
    name: Build (Extension - Primary Analytics)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-ext/primary-analytics

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-ext/primary-analytics/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run CI build
        run: npm run build:ci

  # ============================================
  # Typecheck - Shared Package
  # ============================================
  typecheck-shared:
    name: Typecheck (@awcms/shared)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./packages/awcms-shared

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './packages/awcms-shared/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npm run typecheck

  # ============================================
  # Lint & Build - SMANDAPBUN Portal (Astro)
  # ============================================
  lint-build-smandapbun:
    name: Lint & Build (Smandapbun)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./awcms-public/smandapbun

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: './awcms-public/smandapbun/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run checks
        run: npm run check && npm run lint
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

      - name: Build
        run: npm run build
        env:
          PUBLIC_SUPABASE_URL: "https://mock.supabase.co"
          PUBLIC_SUPABASE_PUBLISHABLE_KEY: "mock-publishable-key"
          PUBLIC_TENANT_ID: "00000000-0000-0000-0000-000000000000"

  # ============================================
  # Database Migrations Check
  # ============================================
  db-check:
    name: Database Migrations Check
    runs-on: ubuntu-latest
    # Assuming this check doesn't need secrets in 'db lint'?
    # Supabase link might need access token? 
    # db lint is static offline check usually.
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Validate migrations
        run: |
          cd awcms/supabase
          supabase db lint
