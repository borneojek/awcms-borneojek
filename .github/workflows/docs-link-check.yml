name: Documentation Link Check

on:
  push:
    paths:
      - '**/*.md'
      - '.mlc_config.json'
      - '.markdownlintignore'
      - 'scripts/check_markdown_local_links.mjs'
  pull_request:
    paths:
      - '**/*.md'
      - '.mlc_config.json'
      - '.markdownlintignore'
      - 'scripts/check_markdown_local_links.mjs'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  link-check:
    name: Check Documentation Links
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22.12.0'

      - name: Run maintained docs checks
        run: npm run docs:check
        working-directory: ./awcms

      - name: Summary
        if: success()
        run: echo "✅ All documentation links are valid!"
